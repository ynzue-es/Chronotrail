# Production override: Caddy TLS reverse proxy + the Next.js web app.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.caddy.yml up -d --build
#
# Caddy terminates TLS for chronotrail.fr (web) and api.chronotrail.fr (kong).
# Kong no longer publishes host ports — it is reached internally by Caddy.

services:

  kong:
    ports: !reset []
    environment:
      KONG_PORT_MAPS: "443:8000,443:8443"

  web:
    container_name: chronotrail-web
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    depends_on:
      kong:
        condition: service_healthy

  caddy:
    container_name: supabase-caddy
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    depends_on:
      kong:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - ./volumes/proxy/caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
